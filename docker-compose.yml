services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iot_attendance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/IoTAttendance.API
      dockerfile: Dockerfile
      # Išvengia veth kūrimo ant bridge build metu (Arch / kai kurios kernel konfigūracijos: „operation not supported“)
      network: host
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DisableHttpsRedirection: "true"
      # Docker bridge + .NET: DNS į „postgres“ kartais meta EAGAIN (11); IPv6 išjungimas padeda.
      DOTNET_SYSTEM_NET_DISABLEIPV6: "1"
      # Optional testing override: pin API time in development only.
      FAKE_NOW: "2026-04-24T11:00:00+03:00"
      APP_TIME_ZONE: "Europe/Vilnius"
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=iot_attendance;Username=postgres;Password=postgres
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Cors__AllowedOrigins__1: "http://127.0.0.1:5173"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - api

volumes:
  pgdata:
  frontend_node_modules:
