# Jei standartinis docker-compose.yml krenta su iptables/NAT (MASQUERADE, POSTROUTING):
#   docker compose -f docker-compose.hostnet.yml up --build
# Visi servisai naudoja host tinklą — Docker nekuria bridge ir nereikia NAT.
# Reikia laisvų portų 5432, 5000, 5173 (sustabdykite vietinį PostgreSQL, jei užima 5432).

services:
  postgres:
    image: postgres:16-alpine
    network_mode: host
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iot_attendance
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/IoTAttendance.API
      dockerfile: Dockerfile
      network: host
    network_mode: host
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      DisableHttpsRedirection: "true"
      ConnectionStrings__DefaultConnection: >-
        Host=127.0.0.1;Port=5432;Database=iot_attendance;Username=postgres;Password=postgres
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Cors__AllowedOrigins__1: "http://127.0.0.1:5173"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    network_mode: host
    working_dir: /app
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - api

volumes:
  pgdata:
  frontend_node_modules:
