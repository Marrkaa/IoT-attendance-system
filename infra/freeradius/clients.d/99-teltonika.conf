# Teltonika RUTX (NAS). Įkelk į /etc/raddb/clients.d/99-teltonika.conf
# Jei radiusd nepasitiki: siaurink ipaddr iki maršrutizatoriaus IP, pvz. 192.168.1.1/32
client teltonika_lab {
	ipaddr = 192.168.0.0/16
	secret = testing123
	require_message_authenticator = no
	nas_type = other
}

# Nekurk antro „client“ su 127.0.0.1 – jau būna clients.conf → „client localhost“.
# radtest secret turi sutapti su TUO (dažnai testing123): sudo grep -A6 'client localhost' /etc/raddb/clients.conf
